<div class="container-fluid">


    <div class="row">
        <div class="col-4"></div>
        <div class="col-4">
            <div class="card border-primary">
                <div class="card-header bg-white">
                    <div class="card-title text-dark font-weight-bolder text-center">
                        Customer registration form
                    </div>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-12">
                            <form  [formGroup]="form" (ngSubmit)="submitForm(form)"> 
                                <div class="form-group row">
                                    <div class="col-12">
                                        <input type="text" class="form-control" name="firstName" placeholder="Enter the first name" formControlName="firstName">
                                        <span *ngIf="form.get('firstName').hasError('required')" class="text-danger text-left d-block">
                                            This field is required
                                        </span>
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <div class="col-12">
                                        <input type="text" class="form-control" name="lastName" placeholder="Enter the last name" formControlName="lastName">
                                        <span *ngIf="form.get('lastName')?.hasError('required')" class="d-block text-danger text-left">
                                            This field is required
                                        </span>
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <div class="col-12">
                                        <input type="text" class="form-control" name="email" placeholder="Enter the email"  formControlName="email">
                                        <span *ngIf="form.get('email')?.hasError('required')" class="d-block text-danger text-left">
                                            This field is required
                                        </span>
                                    </div>
                                </div>

                                <div class="form-group row">
                                    <div class="col-12">
                                            <input type="text" class="form-control" name="password" placeholder="Enter the password" formControlName="password"> 
                                             <span *ngIf="form.get('password')?.hasError('required')" class="d-block text-danger text-left">
                                            This field is required
                                        </span>
                                    </div>
                                </div> 

                                <div class="form-group row">
                                    <div class="col-12">
                                        <input type="text" class="form-control" name="reenterPassword" placeholder="Retype the password" formControlName="reenterPassword"> 
                                         <span *ngIf="form.get('reenterPassword')?.hasError('required')" class="d-block text-danger text-left">
                                            This field is required
                                        </span>
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <div class="col-12">
                                        <input type="submit" class="btn btn-primary float-right">
                                    </div>
                                </div>


                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-4"></div>
    </div>

</div>
